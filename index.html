<style>

/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── TOKENS ── */
:root {
  --navy:        #263444;
  --navy-deep:   #1a2530;
  --teal:        #72cdc6;
  --teal-dim:    rgba(114,205,198,0.14);
  --teal-glow:   rgba(114,205,198,0.30);
  --coral:       #e07258;
  --blue-soft:   #b0cdd8;
  --bg:          #f5f8fa;
  --surface:     #ffffff;
  --tx:          #263444;
  --tx-soft:     #5a7a8a;
  --tx-mute:     #9ab4be;
  --border:      rgba(38,52,68,0.10);
  --f: 'Space Grotesk', system-ui, sans-serif;
}

html { font-family: var(--f); background: var(--bg); color: var(--tx); font-size: 16px; height: 100%; }

body {
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  position: relative; overflow-x: hidden;
  padding: 40px 24px;
}

/* ── ANIMATED BACKGROUND ── */
.bg-layer {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 80% 70% at 15% 10%,  rgba(114,205,198,0.11) 0%, transparent 55%),
    radial-gradient(ellipse 60% 55% at 88% 85%,  rgba(224,114,88,0.07)  0%, transparent 55%),
    radial-gradient(ellipse 50% 60% at 75% 15%,  rgba(176,205,216,0.09) 0%, transparent 50%),
    radial-gradient(ellipse 40% 40% at 20% 85%,  rgba(114,205,198,0.06) 0%, transparent 50%);
  animation: bgshift 18s ease-in-out infinite alternate;
}
@keyframes bgshift {
  0%   { transform: scale(1)    translate(0px,  0px);  opacity: 1;   }
  50%  { transform: scale(1.06) translate(14px,-10px); opacity: .75; }
  100% { transform: scale(1.03) translate(-8px,  6px); opacity: .90; }
}

/* Subtle grid overlay */
.bg-grid {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: .025;
  background-image:
    linear-gradient(var(--navy) 1px, transparent 1px),
    linear-gradient(90deg, var(--navy) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* ── FLOATING SPARKS ── */
.sparks { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
.spark  { position: absolute; opacity: 0; animation: sparkle 8s ease-in-out infinite; }
.spark svg { display: block; }

.spark:nth-child(1) { top: 12%; left:  8%; animation-delay: 0s;   animation-duration:  7s; }
.spark:nth-child(2) { top: 22%; right:10%; animation-delay: 1.8s; animation-duration:  9s; }
.spark:nth-child(3) { top: 65%; left:  5%; animation-delay: 3.2s; animation-duration:  8s; }
.spark:nth-child(4) { top: 75%; right: 8%; animation-delay: 0.9s; animation-duration:  6.5s; }
.spark:nth-child(5) { top: 45%; left: 92%; animation-delay: 2.5s; animation-duration: 10s; }
.spark:nth-child(6) { top: 88%; left: 40%; animation-delay: 4.1s; animation-duration:  7.5s; }
.spark:nth-child(7) { top:  8%; left: 55%; animation-delay: 1.2s; animation-duration: 11s; }

@keyframes sparkle {
  0%   { opacity: 0;   transform: scale(.4) rotate(0deg);   }
  20%  { opacity: .55; transform: scale(1)  rotate(15deg);  }
  50%  { opacity: .35; transform: scale(.8) rotate(-10deg); }
  80%  { opacity: .55; transform: scale(1)  rotate(20deg);  }
  100% { opacity: 0;   transform: scale(.4) rotate(35deg);  }
}

@media (prefers-reduced-motion: reduce) {
  .bg-layer, .spark { animation: none; }
  .spark { opacity: .18; }
}

/* ── MAIN CARD ── */
.card {
  position: relative; z-index: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  box-shadow: 0 24px 80px rgba(38,52,68,0.11), 0 4px 20px rgba(38,52,68,0.06);
  padding: 60px 72px 56px;
  max-width: 640px; width: 100%;
  text-align: center;
  animation: rise .7s cubic-bezier(.22,1,.36,1) both;
}
@keyframes rise {
  from { opacity: 0; transform: translateY(28px) scale(.97); }
  to   { opacity: 1; transform: translateY(0)    scale(1);   }
}

/* Teal top accent bar */
.card::before {
  content: '';
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 72px; height: 3px; background: var(--teal); border-radius: 0 0 4px 4px;
}

/* ── LOGO ── */
.logo-wrap {
  display: flex; justify-content: center; align-items: center;
  margin-bottom: 36px;
}
.logo-wrap img {
  max-width: 320px; width: 100%; height: auto;
  filter: drop-shadow(0 2px 14px rgba(114,205,198,0.20));
  /* smooths rendering */
  image-rendering: -webkit-optimize-contrast;
}

/* ── BADGE ── */
.badge {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 11px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase;
  color: var(--teal); background: var(--teal-dim);
  border: 1px solid var(--teal-glow);
  padding: 7px 18px; border-radius: 100px;
  margin-bottom: 20px;
}
.badge-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--teal);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1;  transform: scale(1);  }
  50%       { opacity: .5; transform: scale(.7); }
}
@media (prefers-reduced-motion: reduce) { .badge-dot { animation: none; } }

/* ── HEADLINE ── */
.headline {
  font-size: clamp(26px, 4vw, 38px); font-weight: 700;
  color: var(--navy); line-height: 1.15; letter-spacing: -.025em;
  margin-bottom: 12px;
}
.headline em { font-style: normal; color: var(--teal); }

.subline {
  font-size: clamp(15px, 1.8vw, 17px); font-weight: 400;
  color: var(--tx-soft); line-height: 1.7;
  max-width: 460px; margin: 0 auto 36px;
}

/* ── COUNTDOWN ── */
.countdown {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 12px; margin-bottom: 36px;
}
.count-item {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 14px; padding: 20px 10px 14px;
  transition: border-color .25s, box-shadow .25s;
}
.count-item:hover {
  border-color: var(--teal);
  box-shadow: 0 4px 16px rgba(114,205,198,0.16);
}
.count-num {
  font-size: clamp(30px, 4.5vw, 44px); font-weight: 700;
  color: var(--navy); line-height: 1; letter-spacing: -.03em;
  font-variant-numeric: tabular-nums;
  /* flip animation on change */
  transition: opacity .12s ease;
}
.count-num.flip { opacity: 0; }
.count-label {
  font-size: 11px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase;
  color: var(--tx-mute); margin-top: 7px;
}

/* ── DIVIDER ── */
.divider { width: 100%; height: 1px; background: var(--border); margin-bottom: 32px; }

/* ── SOCIAL ── */
.social-row {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  flex-wrap: wrap;
}
.social-label {
  font-size: 12px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
  color: var(--tx-mute); margin-right: 4px;
}
.social-link {
  width: 42px; height: 42px; border-radius: 50%;
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  color: var(--tx-soft); text-decoration: none;
  transition: border-color .2s, color .2s, background .2s, transform .2s;
}
.social-link:hover {
  border-color: var(--teal); color: var(--teal);
  background: var(--teal-dim); transform: translateY(-2px);
}
.social-link:focus-visible { outline: 2px solid var(--teal); outline-offset: 3px; }

/* ── FOOTER TEXT ── */
.foot-text {
  position: relative; z-index: 1;
  margin-top: 28px; font-size: 13px; color: var(--tx-mute); text-align: center;
  animation: rise .9s cubic-bezier(.22,1,.36,1) .15s both;
}

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .card { padding: 44px 24px 40px; border-radius: 20px; }
  .countdown { gap: 8px; }
  .count-item { padding: 14px 6px 10px; border-radius: 10px; }
  .social-row { gap: 8px; }
}
@media (max-width: 360px) {
  .countdown { grid-template-columns: repeat(2, 1fr); }
}

</style>
</head>
